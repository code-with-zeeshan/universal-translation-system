name: Unsafe YAML Load Check

on:
  push:
  pull_request:

jobs:
  yaml-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unsafe yaml.load check
        run: |
          python scripts/precommit/check_unsafe_yaml.py