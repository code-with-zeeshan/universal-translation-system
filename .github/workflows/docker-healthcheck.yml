name: Docker Build + Healthcheck

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docker/**'
      - 'cloud_decoder/**'
      - 'coordinator/**'
      - '.github/workflows/docker-healthcheck.yml'
  push:
    branches: [ main ]
    paths:
      - 'docker/**'
      - 'cloud_decoder/**'
      - 'coordinator/**'

jobs:
  build-and-healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build decoder image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/decoder.Dockerfile
          push: false
          tags: local/decoder:health

      - name: Build coordinator image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/coordinator.Dockerfile
          push: false
          tags: local/coordinator:health

      - name: Run decoder container
        run: |
          docker run -d --name decoder -p 8000:8000 local/decoder:health
          for i in {1..30}; do
            sleep 2
            if curl -fsS http://localhost:8000/health >/dev/null; then echo "decoder healthy"; break; fi
            echo "waiting for decoder...";
          done
          curl -fsS http://localhost:8000/health
          curl -fsS -o /dev/null -w "%{http_code}\n" http://localhost:8000/ready || true

      - name: Stop decoder
        if: always()
        run: docker rm -f decoder || true

      - name: Run coordinator container
        run: |
          docker run -d --name coordinator -p 5100:5100 local/coordinator:health
          for i in {1..30}; do
            sleep 2
            if curl -fsS http://localhost:5100/health >/dev/null; then echo "coordinator healthy"; break; fi
            echo "waiting for coordinator...";
          done
          curl -fsS http://localhost:5100/health
          curl -fsS -o /dev/null -w "%{http_code}\n" http://localhost:5100/ready || true

      - name: Stop coordinator
        if: always()
        run: docker rm -f coordinator || true