name: Kubernetes Lint & Validate

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'kubernetes/**'
      - '.github/workflows/k8s-validate.yml'

jobs:
  kubeval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests with kubeconform
        run: |
          kubeconform -strict -ignore-missing-schemas kubernetes/*.yaml

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Client-side dry-run apply
        run: |
          for f in kubernetes/*.yaml; do
            kubectl apply --dry-run=client -f "$f"
          done