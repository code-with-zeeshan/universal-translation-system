name: Schema Hash Drift Check

on:
  pull_request:
    paths:
      - 'config/schemas.py'
      - 'docs/schemas/**'
      - 'openapi.yaml'
      - 'openapi.yml'
      - 'openapi.json'
      - 'proto/**'
      - 'version-config.json'
  workflow_dispatch:

jobs:
  check-schema-hash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute expected schema hash (without modifying files) and compare
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path

          ROOT = Path('.').resolve()

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(8192), b""):
                      h.update(chunk)
              return h.hexdigest()

          # Collect schema files similar to scripts/update_schema_hash.py
          files = []
          schemas_root = ROOT / 'docs' / 'schemas'
          if schemas_root.exists():
              for p in schemas_root.rglob('*'):
                  if p.is_file() and (p.suffix.lower() in {'.yaml', '.yml', '.json'} or p.suffix.lower() == '.proto'):
                      files.append(p)
          for p in [ROOT / 'openapi.yaml', ROOT / 'openapi.yml', ROOT / 'openapi.json']:
              if p.exists():
                  files.append(p)
          proto_dir = ROOT / 'proto'
          if proto_dir.exists():
              files += list(proto_dir.rglob('*.proto'))

          if not files:
              print('No schema files found; skipping check (pass).')
              raise SystemExit(0)

          comb = hashlib.sha256()
          for p in files:
              try:
                  h = sha256_file(p)
                  comb.update(bytes.fromhex(h))
              except Exception:
                  pass
          expected_hash = comb.hexdigest()

          cfg_path = ROOT / 'version-config.json'
          data = json.loads(cfg_path.read_text(encoding='utf-8'))
          actual_hash = (data.get('core') or {}).get('schemaHash') or ''
          api_ver = (data.get('core') or {}).get('apiVersion') or ''

          print('Expected schemaHash:', expected_hash)
          print('Current version-config.json core.schemaHash:', actual_hash)

          if not api_ver:
              print('core.apiVersion missing in version-config.json; please set it.');
              raise SystemExit(1)

          if actual_hash != expected_hash:
              print('\n❌ Schema hash drift detected. To fix:')
              print('  1) Run: python scripts/update_schema_hash.py')
              print('  2) Commit the updated version-config.json')
              print('     (or push a tag to trigger auto-update workflow)')
              raise SystemExit(1)
          print('✅ Schema hash is up-to-date.')
          PY