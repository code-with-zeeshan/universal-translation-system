name: Auto-update schema hash on PR (trusted branches)

on:
  pull_request:
    branches:
      - main
      - 'release/**'
    paths:
      - 'docs/schemas/**'
      - 'openapi.yaml'
      - 'openapi.yml'
      - 'openapi.json'
      - 'proto/**'
      - 'version-config.json'

jobs:
  update-schema-hash:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compute and update schema hash
        run: |
          python scripts/update_schema_hash.py
      - name: Detect changes
        id: gitdiff
        run: |
          if git diff --quiet --exit-code; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Commit back to PR branch (same-repo only)
        if: steps.gitdiff.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version-config.json
          git commit -m "chore(core): auto-update schema hash on PR"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Create helper PR (fork fallback)
        if: steps.gitdiff.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name != github.repository
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(core): update schema hash (PR fork fallback)'
          title: 'chore(core): update schema hash'
          body: 'Auto-generated update for schema hash. For forks, please pull this change into your PR branch.'
          branch: ci/update-schema-hash-${{ github.run_id }}