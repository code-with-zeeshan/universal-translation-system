name: Python Tests (Core + Endpoints)

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'cloud_decoder/**'
      - 'coordinator/**'
      - 'tests/**'
      - 'requirements/base.txt'
      - '.github/workflows/python-tests.yml'
  push:
    branches: [ main ]
    paths:
      - 'cloud_decoder/**'
      - 'coordinator/**'
      - 'tests/**'
      - 'requirements/base.txt'

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt
          # Light extras for serving & tests
          pip install -r requirements/serve.txt || true
          pip install pytest pytest-cov

      - name: Run tests
        env:
          # Avoid heavy decoder startup during unit tests
          UTS_TEST_MODE: '1'
        run: |
          pytest -q --disable-warnings --maxfail=1