name: Docker CI (Build, Healthcheck, Publish)

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docker/**'
      - 'cloud_decoder/**'
      - 'coordinator/**'
      - '.github/workflows/docker-build-publish.yml'
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build-healthcheck-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAMESPACE: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Optional login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Define tags
        id: vars
        run: |
          SHA_TAG=${GITHUB_SHA::12}
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "release_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Build images (decoder)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/decoder.Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.vars.outputs.image_namespace || env.IMAGE_NAMESPACE }}/decoder:sha-${{ steps.vars.outputs.sha_tag }}
            ${{ github.event_name == 'push' && 'ghcr.io/' || '' }}${{ github.event_name == 'push' && (steps.vars.outputs.image_namespace || env.IMAGE_NAMESPACE) || '' }}${{ github.event_name == 'push' && '/decoder:latest' || '' }}
            ${{ github.event_name == 'push' && steps.vars.outputs.release_tag && 'ghcr.io/' || '' }}${{ github.event_name == 'push' && steps.vars.outputs.release_tag && (steps.vars.outputs.image_namespace || env.IMAGE_NAMESPACE) || '' }}${{ github.event_name == 'push' && steps.vars.outputs.release_tag && '/decoder:' || '' }}${{ steps.vars.outputs.release_tag || '' }}

      - name: Build images (coordinator)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/coordinator.Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.vars.outputs.image_namespace || env.IMAGE_NAMESPACE }}/coordinator:sha-${{ steps.vars.outputs.sha_tag }}
            ${{ github.event_name == 'push' && 'ghcr.io/' || '' }}${{ github.event_name == 'push' && (steps.vars.outputs.image_namespace || env.IMAGE_NAMESPACE) || '' }}${{ github.event_name == 'push' && '/coordinator:latest' || '' }}
            ${{ github.event_name == 'push' && steps.vars.outputs.release_tag && 'ghcr.io/' || '' }}${{ github.event_name == 'push' && steps.vars.outputs.release_tag && (steps.vars.outputs.image_namespace || env.IMAGE_NAMESPACE) || '' }}${{ github.event_name == 'push' && steps.vars.outputs.release_tag && '/coordinator:' || '' }}${{ steps.vars.outputs.release_tag || '' }}

      - name: Optional push to Docker Hub (decoder)
        if: ${{ github.event_name == 'push' && secrets.DOCKERHUB_REPO && secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/decoder.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_REPO }}/decoder:sha-${{ steps.vars.outputs.sha_tag }}
            ${{ secrets.DOCKERHUB_REPO }}/decoder:latest
            ${{ steps.vars.outputs.release_tag && format('{0}/decoder:{1}', secrets.DOCKERHUB_REPO, steps.vars.outputs.release_tag) || '' }}

      - name: Optional push to Docker Hub (coordinator)
        if: ${{ github.event_name == 'push' && secrets.DOCKERHUB_REPO && secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/coordinator.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_REPO }}/coordinator:sha-${{ steps.vars.outputs.sha_tag }}
            ${{ secrets.DOCKERHUB_REPO }}/coordinator:latest
            ${{ steps.vars.outputs.release_tag && format('{0}/coordinator:{1}', secrets.DOCKERHUB_REPO, steps.vars.outputs.release_tag) || '' }}

      - name: Healthcheck decoder
        run: |
          docker run -d --name decoder -p 8000:8000 ghcr.io/${{ env.IMAGE_NAMESPACE }}/decoder:sha-${{ steps.vars.outputs.sha_tag }}
          healthy=false
          for i in {1..30}; do
            sleep 2
            if curl -fsS http://localhost:8000/health >/dev/null; then healthy=true; echo "decoder healthy"; break; fi
            echo "waiting for decoder... (attempt $i/30)";
          done
          if [ "$healthy" != "true" ]; then echo "decoder healthcheck FAILED"; exit 1; fi
          curl -fsS -o /dev/null -w "/ready HTTP %{http_code}\n" http://localhost:8000/ready || true

      - name: Stop decoder
        if: always()
        run: docker rm -f decoder || true

      - name: Healthcheck coordinator
        run: |
          docker run -d --name coordinator -p 5100:5100 ghcr.io/${{ env.IMAGE_NAMESPACE }}/coordinator:sha-${{ steps.vars.outputs.sha_tag }}
          healthy=false
          for i in {1..30}; do
            sleep 2
            if curl -fsS http://localhost:5100/health >/dev/null; then healthy=true; echo "coordinator healthy"; break; fi
            echo "waiting for coordinator... (attempt $i/30)";
          done
          if [ "$healthy" != "true" ]; then echo "coordinator healthcheck FAILED"; exit 1; fi
          curl -fsS -o /dev/null -w "/ready HTTP %{http_code}\n" http://localhost:5100/ready || true

      - name: Stop coordinator
        if: always()
        run: docker rm -f coordinator || true