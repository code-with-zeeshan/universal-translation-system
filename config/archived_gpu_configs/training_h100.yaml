# NOTE: Archived — NOT loaded by the trainer.
# Source of truth: trainer.py _determine_optimal_strategy() H100 / HIGH_END_SINGLE
# Overridden by hardcoded TrainingStrategy — this file is documentation only.
training:
  batch_size: 128
  accumulation_steps: 1
  effective_batch_size: 128
  lr: 6e-4
  gradient_checkpointing: false
  cpu_offload: false
  activation_offload: false
  compile_model: true
  compile_mode: "max-autotune"
  dtype: "bfloat16"
  num_workers: 8
  prefetch_factor: 8
  warmup_steps: 4000
  gradient_clipping: 1.0
  use_flash_attention: true
  use_channels_last: true
  enable_nested_tensor: true
  use_inductor: true
  max_split_size: 512
  empty_cache_freq: 100
