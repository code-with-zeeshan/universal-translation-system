# NOTE: Archived — NOT loaded by the trainer.
# Source of truth: trainer.py _determine_optimal_strategy() "rtx3090"
# Overridden by hardcoded TrainingStrategy — this file is documentation only.
training:
  batch_size: 16
  accumulation_steps: 8
  effective_batch_size: 128
  lr: 3e-4
  gradient_checkpointing: true
  cpu_offload: true
  activation_offload: false
  compile_model: true
  compile_mode: "reduce-overhead"
  dtype: "bfloat16"
  num_workers: 4
  prefetch_factor: 4
  warmup_steps: 2000
  gradient_clipping: 1.0
  use_flash_attention: true
  max_split_size: 256
  empty_cache_freq: 100
