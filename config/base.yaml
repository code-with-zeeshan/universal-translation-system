# config/base.yaml
# Base configuration - shared across all GPU types
# This file contains common settings to reduce duplication

config_version: "1.0.0"
data_version: "1.0.0"
pipeline_version: "1.0.0"

# Data configuration
data:
  max_sentence_length: 128
  output_dir: "data/processed"
  total_size_gb: 2
  processed_dir: data/processed
  checkpoint_dir: "checkpoints/default_run" # Added for better organization
  model_dir: "models/production"
  languages:
    - en
    - es
    - fr
    - de
    - zh
    - ja
    - ko
    - ar
    - hi
    - ru
    - pt
    - it
    - tr
    - th
    - vi
    - pl
    - uk
    - nl
    - id
    - sv
  
  training_distribution:
    en-es: 400000
    en-fr: 400000
    en-de: 400000
    en-zh: 300000
    en-ru: 300000
    en-ja: 200000
    en-ar: 200000
    en-pt: 200000
    en-it: 200000
    en-hi: 100000
    en-ko: 100000
    en-tr: 100000
    en-th: 60000
    en-vi: 60000
    en-pl: 60000
    en-uk: 60000
    en-nl: 60000
    en-id: 60000
    en-sv: 60000
    es-pt: 40000
    zh-ja: 40000
    fr-es: 40000
    de-fr: 40000
    ru-uk: 40000
    es-fr: 40000
    it-es: 40000
    it-fr: 40000
    nl-de: 40000
    pl-ru: 40000
    ko-ja: 40000
    vi-zh: 40000
    ar-fr: 40000
    th-vi: 40000
  
  augmentation_pairs:
    - en-es
    - en-fr
    - en-de
    - en-zh
    - en-ru
    - en-ja
    - en-ar
    - en-pt
    - en-it
    - es-pt
    - de-fr
    - zh-ja
    - ru-uk
    - es-fr
    - it-es
    - it-fr
    - nl-de
    - pl-ru
    - ko-ja
    - vi-zh
    - ar-fr
    - th-vi

  vocabulary_strategy:
    approach: production # or "research"
    groups:
      latin: [en, es, fr, de, it, pt, nl, sv, pl, id, vi, tr]
      cjk: [zh, ja, ko]
      arabic: [ar]
      devanagari: [hi]
      cyrillic: [ru, uk]
      thai: [th]

data_strategy:
  priority_rules:
    high: ['en-es', 'en-fr', 'en-de', 'en-zh', 'en-ru']
    medium: ['en-ja', 'en-ar', 'en-pt', 'en-it', 'en-hi', 'en-ko',
             'es-pt', 'es-fr', 'de-fr', 'zh-ja', 'ar-fr', 'ru-uk',
             'it-es', 'it-fr', 'nl-de', 'pl-ru', 'ko-ja', 'vi-zh', 'th-vi']
    low: ['en-tr', 'en-th', 'en-vi', 'en-pl', 'en-uk', 'en-nl', 'en-id', 'en-sv']
  
  source_preferences:
    en_centric: ['opus-100', 'opus_opensubtitles', 'wmt']
    european: ['opus-100', 'opus_opensubtitles', 'wmt']
    asian: ['opus-100']
    default: ['opus-100', 'opus_opensubtitles']


# Model architecture (compact ~40MB target)
model:
  hidden_dim: 768
  num_layers: 6
  num_heads: 8
  decoder_dim: 512
  decoder_layers: 6
  decoder_heads: 8
  dropout: 0.1
  max_vocab_size: 32000

# Common training settings
training:
  # High-level strategy
  use_fsdp: false
  num_epochs: 10
  batch_size: 32
  accumulation_steps: 4
  effective_batch_size: 128

  # Hyperparameters
  lr: 5e-4
  weight_decay: 0.01
  warmup_steps: 4000
  max_grad_norm: 1.0
  
  # PEFT / LoRA (freeze backbone, train only adapters)
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  use_rslora: true

  # Memory & Performance Optimizations
  mixed_precision: true
  dtype: "bfloat16"
  gradient_checkpointing: true
  cpu_offload: false
  activation_offload: false
  compile_model: true
  compile_mode: "auto"
  flash_attention: true
  use_fp8: false
  max_split_size: 512
  empty_cache_freq: 100

  # Distributed Training Settings
  sharding_strategy: "FULL_SHARD"
  backward_prefetch: "BACKWARD_PRE"
  
  # Logging and Saving
  save_every: 2
  validate_every: 1
  log_every: 50
  profile_training: false # Added missing parameter
  max_sentence_length: 128
  dynamic_vocabulary: true
  vocab_switch_penalty: 0.001

# Distributed training defaults
distributed:
  backend: nccl
  find_unused_parameters: false
  broadcast_buffers: false
  bucket_cap_mb: 25
  gradient_as_bucket_view: true
  static_graph: true

# Monitoring and logging
monitoring:
  use_wandb: false
  use_tensorboard: false
  log_gradients: false
  log_weights: false
  log_learning_rate: true   

# Pipeline execution settings
pipeline:
  enabled_stages:
    - download_evaluation
    - download_training
    - sample_filter
    - augment
    - create_ready
    - validate
    - vocabulary
  comet_quality_threshold: 0.7
  max_dynamic_ff_per_pair: 5000
  max_idiom_per_lang: 2000

security:
  trusted_model_sources:
    - facebook/
    - microsoft/
    - google/
    - Helsinki-NLP/
  enable_path_validation: true
  max_file_size_gb: 10   