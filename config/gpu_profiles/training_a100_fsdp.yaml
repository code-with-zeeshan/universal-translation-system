# NOTE: Archived — NOT loaded by the trainer.
# Source of truth: trainer.py _determine_optimal_strategy() HIGH_END_MULTI (A100 FSDP)
# Overridden by hardcoded TrainingStrategy — this file is documentation only.
training:
  use_fsdp: true
  use_distributed: true
  distributed_backend: "nccl"
  batch_size: 128  # per GPU; multiplied by gpu_count at runtime
  accumulation_steps: 1
  lr: 5e-4
  gradient_checkpointing: true
  cpu_offload: false
  activation_offload: false
  compile_model: true
  compile_mode: "max-autotune"
  dtype: "bfloat16"
  num_workers: 8
  prefetch_factor: 8
  warmup_steps: 4000
  gradient_clipping: 1.0
  use_flash_attention: true
  use_inductor: true
  use_channels_last: true
  enable_nested_tensor: true
