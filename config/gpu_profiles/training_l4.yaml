# NOTE: Archived — NOT loaded by the trainer.
# Source of truth: trainer.py _determine_optimal_strategy() "l4"
# Overridden by hardcoded TrainingStrategy — this file is documentation only.
training:
  batch_size: 24  # subsequently overridden by probe (dynamic batch sizer)
  accumulation_steps: 5
  lr: 2e-4
  gradient_checkpointing: false  # removed — let torch.compile fuse full graph
  cpu_offload: false
  activation_offload: false
  compile_model: true
  compile_mode: "reduce-overhead"  # decoder only; encoder exempted
  dtype: "bfloat16"
  num_workers: 4
  prefetch_factor: 8
  warmup_steps: 1500
  gradient_clipping: 1.0
  use_flash_attention: true
  max_split_size: 256
  empty_cache_freq: 100
