training:
  batch_size: 24
  accumulation_steps: 5
  effective_batch_size: 120
  lr: 4e-4
  gradient_checkpointing: true
  cpu_offload: false
  activation_offload: false
  compile_model: true
  compile_mode: "reduce-overhead"
