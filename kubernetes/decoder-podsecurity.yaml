apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: decoder-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: decoder
---
apiVersion: v1
kind: LimitRange
metadata:
  name: decoder-limits
spec:
  limits:
    - type: Container
      default:
        cpu: "2"
        memory: "8Gi"
      defaultRequest:
        cpu: "1"
        memory: "4Gi"