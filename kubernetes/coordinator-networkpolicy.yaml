apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: coordinator-allow-from-ingress-and-decoder
spec:
  podSelector:
    matchLabels:
      app: coordinator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ingress  # adjust if using different ingress controller labels
        - podSelector:
            matchLabels:
              app: decoder
      ports:
        - protocol: TCP
          port: 5100
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: decoder
      ports:
        - protocol: TCP
          port: 8000
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80